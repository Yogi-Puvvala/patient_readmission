services:

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: readmission_api
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 20s        # ← increase timeout (TF takes time to load)
      retries: 5          # ← increase retries
      start_period: 60s   # ← give container time to fully start

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: readmission_frontend
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy